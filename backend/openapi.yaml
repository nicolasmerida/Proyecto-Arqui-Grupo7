openapi: 3.0.3
info:
  title: API del Sistema de Gestión de Restaurante
  version: 1.0.0
  description: >
    Contrato de diseño unificado para el backend del restaurante — Grupo 7.
    Cubre Mesas, Comandas, Ítems de Pedido, Platos, Categorías, Recetas,
    Ingredientes, Movimientos de Stock y Usuarios.


servers:
  - url: http://localhost:8080
    description: Servidor local de desarrollo (Spring Boot)


tags:
  - name: Mesas
    description: Gestión de mesas, estados y aperturas (HU-01, HU-02, HU-03)
  - name: Comandas
    description: Ciclo de vida de una comanda — apertura, estados, cierre y cuenta (HU-02, HU-03)
  - name: Items Pedido
    description: Ítems asociados a una comanda — cocina y mozos (HU-04, HU-06, HU-07, HU-14)
  - name: Platos
    description: Catálogo de platos del menú (HU-04, HU-13)
  - name: Categorias
    description: Agrupación de platos por tipo
  - name: Recetas
    description: Relación entre platos e ingredientes con cantidad requerida (HU-11)
  - name: Ingredientes
    description: Inventario de ingredientes y alertas de stock (HU-09, HU-12)
  - name: MovimientosStock
    description: Auditoría de altas y bajas de stock (HU-10, HU-17)
  - name: Usuarios
    description: Gestión del personal del restaurante (HU-16)
  - name: Menu
    description: Menú público paginado para el frontend


# ─── SEGURIDAD ────────────────────────────────────────────────────────────────
# NOTA: La autenticación JWT está pendiente de implementar (Spring Security).
# Los endpoints marcados con security: bearerAuth quedarán protegidos una vez implementada.


paths:


  # ─── MÓDULO: MESAS ────────────────────────────────────────────────────────
  /mesas:
    get:
      tags: [Mesas]
      summary: Listar todas las mesas del salón
      description: Retorna el estado actual de todas las mesas (HU-01 — vista del salón).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listado de mesas devuelto con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mesa'
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null


    post:
      tags: [Mesas]
      summary: Registrar una nueva mesa
      description: Crea una mesa con capacidad, sector y estado inicial Libre.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MesaInput'
      responses:
        '201':
          description: Mesa creada exitosamente
          headers:
            Location:
              description: URL de la mesa recién creada
              schema:
                type: string
                example: /mesas/5
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesa'
        '400':
          description: Datos inválidos (campo faltante o tipo incorrecto)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: DATOS_INVALIDOS
                  message: Datos inválidos (campo faltante o tipo incorrecto)
                  details: null
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null


  /mesas/{numero}:
    get:
      tags: [Mesas]
      summary: Obtener una mesa por número
      description: Retorna los datos y estado actual de una mesa específica.
      security:
        - bearerAuth: []
      parameters:
        - name: numero
          in: path
          required: true
          description: Número identificador de la mesa
          schema:
            type: integer
            format: int32
            example: 3
      responses:
        '200':
          description: Mesa encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesa'
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: La mesa con ese número no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: MESA_NO_ENCONTRADA
                  message: La mesa con ese número no existe
                  details: null


    delete:
      tags: [Mesas]
      summary: Eliminar una mesa
      description: Elimina una mesa del sistema. Solo aplicable si no tiene comandas activas.
      security:
        - bearerAuth: []
      parameters:
        - name: numero
          in: path
          required: true
          description: Número identificador de la mesa
          schema:
            type: integer
            format: int32
            example: 3
      responses:
        '204':
          description: Mesa eliminada exitosamente (sin cuerpo)
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: La mesa con ese número no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: MESA_NO_ENCONTRADA
                  message: La mesa con ese número no existe
                  details: null


  /mesas/estado/{estado}:
    get:
      tags: [Mesas]
      summary: Filtrar mesas por estado
      description: Retorna todas las mesas que se encuentran en el estado indicado.
      security:
        - bearerAuth: []
      parameters:
        - name: estado
          in: path
          required: true
          description: Estado de la mesa a filtrar
          schema:
            type: string
            enum: [Libre, Ocupada, Reservada]
            example: Libre
      responses:
        '200':
          description: Listado de mesas en el estado solicitado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mesa'
        '400':
          description: El estado enviado no es un valor válido (Libre, Ocupada, Reservada)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: ESTADO_INVALIDO
                  message: El estado enviado no es un valor válido (Libre, Ocupada, Reservada)
                  details: null
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null


  /mesas/{numero}/estado:
    put:
      tags: [Mesas]
      summary: Actualizar el estado de una mesa (Abrir HU-02 / Cerrar HU-03)
      description: >
        Unifica las acciones de abrir y cerrar mesa.
        Si se envía 'Ocupada': crea automáticamente una comanda asociada. Valida que la mesa esté Libre y que los comensales no superen la capacidad.
        Si se envía 'Libre': cierra la mesa y la comanda asociada. Solo es posible si todos los ítems de la comanda fueron entregados. Consultar GET /comandas/{id}/total antes de cobrar.
      security:
        - bearerAuth: []
      parameters:
        - name: numero
          in: path
          required: true
          description: Número identificador de la mesa
          schema:
            type: integer
            format: int32
            example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estadoMesa]
              properties:
                estadoMesa:
                  type: string
                  enum: [Libre, Ocupada]
                numeroComensales:
                  type: integer
                  description: Cantidad de comensales que ocuparán la mesa (Requerido solo si estadoMesa es Ocupada)
                  format: int32
                  minimum: 1
                  example: 4
      responses:
        '200':
          description: Mesa actualizada exitosamente (abierta o cerrada)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesa'
        '400':
          description: >
            Reglas de negocio fallidas al abrir: la mesa ya está Ocupada o Reservada,
            o la cantidad de comensales supera la capacidad.
            Reglas de negocio fallidas al cerrar: hay ítems pendientes de entrega o no se puede cerrar aún.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: REGLA_NEGOCIO_FALLIDA
                  message: Reglas de negocio fallidas al abrir la mesa ya está Ocupada o Reservada, o la cantidad de comensales supera la capacidad. Reglas de negocio fallidas al cerrar hay ítems pendientes de entrega o no se puede cerrar aún.
                  details: null
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: La mesa con ese número no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: MESA_NO_ENCONTRADA
                  message: La mesa con ese número no existe
                  details: null

  /comandas:
    get:
      tags: [Comandas]
      summary: Listar todas las comandas
      description: Retorna el historial completo de comandas registradas en el sistema.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listado de comandas devuelto con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comanda'
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null


    post:
      tags: [Comandas]
      summary: Crear una comanda manualmente
      description: >
        Registra una nueva comanda directamente. En el flujo normal,
        la comanda se crea automáticamente al abrir una mesa (PUT /mesas/{numero}/abrir).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComandaInput'
      responses:
        '201':
          description: Comanda creada exitosamente
          headers:
            Location:
              description: URL de la comanda recién creada
              schema:
                type: string
                example: /comandas/101
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comanda'
        '400':
          description: Datos inválidos (mesa o estado faltante)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: ESTADO_INVALIDO
                  message: Datos inválidos (mesa o estado faltante)
                  details: null
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null


  /comandas/{id}:
    get:
      tags: [Comandas]
      summary: Obtener una comanda por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Número identificador de la comanda
          schema:
            type: integer
            format: int32
            example: 101
      responses:
        '200':
          description: Comanda encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comanda'
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: La comanda con ese ID no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: COMANDA_NO_ENCONTRADA
                  message: La comanda con ese ID no existe
                  details: null


    delete:
      tags: [Comandas]
      summary: Eliminar una comanda
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Número identificador de la comanda
          schema:
            type: integer
            format: int32
            example: 101
      responses:
        '204':
          description: Comanda eliminada exitosamente (sin cuerpo)
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: La comanda con ese ID no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: COMANDA_NO_ENCONTRADA
                  message: La comanda con ese ID no existe
                  details: null


  /comandas/mesa/{numeroMesa}:
    get:
      tags: [Comandas]
      summary: Obtener la comanda activa de una mesa
      description: Retorna la comanda que no está Cerrada ni Cancelada para la mesa indicada.
      security:
        - bearerAuth: []
      parameters:
        - name: numeroMesa
          in: path
          required: true
          description: Número identificador de la mesa
          schema:
            type: integer
            format: int32
            example: 3
      responses:
        '200':
          description: Comanda activa de la mesa devuelta con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comanda'
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: No hay comanda activa para la mesa indicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: MESA_NO_ENCONTRADA
                  message: No hay comanda activa para la mesa indicada
                  details: null


  /comandas/estado/{estado}:
    get:
      tags: [Comandas]
      summary: Filtrar comandas por estado
      security:
        - bearerAuth: []
      parameters:
        - name: estado
          in: path
          required: true
          description: Estado de la comanda a filtrar
          schema:
            type: string
            enum: [Abierta, Cancelada, "En preparacion", Lista, Entregada, Cerrada]
            example: Abierta
      responses:
        '200':
          description: Listado de comandas en el estado solicitado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comanda'
        '400':
          description: El estado enviado no es un valor válido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: ESTADO_INVALIDO
                  message: El estado enviado no es un valor válido
                  details: null
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null


  /comandas/{id}/estado:
    put:
      tags: [Comandas]
      summary: Cambiar el estado de una comanda
      description: >
        Avanza la comanda en su ciclo de vida.
        Transiciones válidas: Abierta→En preparacion, Abierta→Cancelada,
        En preparacion→Lista, Lista→Entregada, Entregada→Cerrada.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nuevoEstado]
              properties:
                nuevoEstado:
                  type: string
                  enum: [Abierta, Cancelada, "En preparacion", Lista, Entregada, Cerrada]
                  example: "En preparacion"
      parameters:
        - name: id
          in: path
          required: true
          description: Número identificador de la comanda
          schema:
            type: integer
            format: int32
            example: 101
      responses:
        '200':
          description: Estado actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comanda'
        '400':
          description: Transición de estado inválida según la máquina de estados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: TRANSICION_INVALIDA
                  message: Transición de estado inválida según la máquina de estados
                  details: null
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: La comanda con ese ID no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: COMANDA_NO_ENCONTRADA
                  message: La comanda con ese ID no existe
                  details: null


  /comandas/{id}/total:
    get:
      tags: [Comandas]
      summary: Calcular el total a cobrar de una comanda (HU-03)
      description: >
        Suma precio × cantidad de cada ítem no cancelado.
        Se llama antes de cerrar la mesa para informar al cliente el monto final.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Número identificador de la comanda
          schema:
            type: integer
            format: int32
            example: 101
      responses:
        '200':
          description: Total calculado exitosamente
          content:
            application/json:
              schema:
                type: number
                format: double
                example: 11500.50
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: La comanda con ese ID no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: COMANDA_NO_ENCONTRADA
                  message: La comanda con ese ID no existe
                  details: null


  # ─── MÓDULO: ÍTEMS DE PEDIDO ──────────────────────────────────────────────
  /items-pedido:
    post:
      tags: [Items Pedido]
      summary: Agregar un ítem a una comanda (HU-04)
      description: >
        Asocia un plato y una cantidad a una comanda activa.
        Descuenta automáticamente los ingredientes del stock según la receta del plato.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemPedidoInput'
      responses:
        '201':
          description: Ítem agregado exitosamente — stock descontado automáticamente
          headers:
            Location:
              description: URI del recurso recién creado
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemPedidoResponse'
        '400':
          description: >
            Datos inválidos (cantidad menor a 1, campos faltantes)
            o stock insuficiente para preparar el plato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: DATOS_INVALIDOS
                  message: Datos inválidos (cantidad menor a 1, campos faltantes)
                  details: null
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: El número de comanda o el ID del plato no existen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: COMANDA_NO_ENCONTRADA
                  message: El número de comanda o el ID del plato no existen
                  details: null


    delete:
      tags: [Items Pedido]
      summary: Eliminar un ítem de una comanda
      description: Remueve un ítem usando la clave compuesta (numeroComanda + idPlato) como query parameters.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: numeroComanda
          required: true
          schema:
            type: integer
            example: 101
        - in: query
          name: idPlato
          required: true
          schema:
            type: integer
            example: 45
      responses:
        '204':
          description: Ítem eliminado correctamente (sin cuerpo)
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: No existe un ítem con esa combinación de comanda y plato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: COMANDA_NO_ENCONTRADA
                  message: No existe un ítem con esa combinación de comanda y plato
                  details: null


  /items-pedido/comanda/{numeroComanda}:
    get:
      tags: [Items Pedido]
      summary: Listar ítems de una comanda
      description: Devuelve todos los platos asociados a una comanda con sus estados actuales.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: numeroComanda
          required: true
          schema:
            type: integer
            example: 101
      responses:
        '200':
          description: Listado de ítems de la comanda
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemPedidoResponse'
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: La comanda con ese número no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: COMANDA_NO_ENCONTRADA
                  message: La comanda con ese número no existe
                  details: null


  /items-pedido/estado/{estado}:
    get:
      tags: [Items Pedido]
      summary: Filtrar ítems por estado — pantalla de cocina (HU-06)
      description: >
        Retorna los ítems en el estado indicado, ordenados por fecha de comanda.
        La cocina consulta este endpoint para ver los pedidos Pendientes y En preparacion.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: estado
          required: true
          schema:
            type: string
            enum: [Pendiente, "En preparacion", Listo, Entregado, Cancelado]
            example: Pendiente
      responses:
        '200':
          description: Listado de ítems en el estado solicitado
          content:
            application/json:
