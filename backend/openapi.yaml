      summary: Actualizar el estado de un ítem (HU-07)
      description: >
        Avanza el ítem en su ciclo de vida.
        Transiciones válidas: Pendiente→En preparacion, Pendiente→Cancelado,
        En preparacion→Listo, Listo→Entregado.
        Al cancelar, devuelve automáticamente los ingredientes al stock (HU-14).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstadoItemInput'
      responses:
        '200':
          description: Estado del ítem actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemPedidoResponse'
        '400':
          description: Transición de estado inválida (ej. intentar cancelar un ítem En preparacion)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: TRANSICION_INVALIDA
                  message: Transición de estado inválida (ej. intentar cancelar un ítem En preparacion)
                  details: null
        '401':
          description: Token no enviado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NO_AUTORIZADO
                  message: Token no enviado o inválido
                  details: null
        '404':
          description: El ítem con esa combinación de comanda y plato no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
