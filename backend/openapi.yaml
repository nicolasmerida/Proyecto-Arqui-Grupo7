openapi: 3.0.3
info:
  title: API del Sistema de Gestión de Restaurante
  version: 1.0.0
  description: Contrato de diseño unificado para el backend completo del restaurante. Incluye Mesas, Comandas, Ítems, Platos, Ingredientes, Recetas, Categorías, Movimientos de Stock y Usuarios.

servers:
  - url: http://localhost:8080
    description: Servidor Local de Desarrollo (Spring Boot)

tags:
  - name: Mesas
    description: Gestión de mesas, estados y aperturas
  - name: Comanda
    description: Operaciones relacionadas con la gestión de comandas del salón
  - name: Ítems Pedido
    description: Gestión de platos asociados a comandas (Cocina y Mozos)
  - name: Platos
    description: Catálogo de platos del menú
  - name: Categorias
    description: Gestión del catálogo de categorías del menú
  - name: Recetas
    description: Relación entre platos e ingredientes
  - name: Ingredientes
    description: Gestión del inventario
  - name: MovimientosStock
    description: Auditoría de altas y bajas de stock
  - name: Usuarios
    description: Gestión del personal del restaurante

paths:
  # ─── MÓDULO: MESAS ───────────────────────────────────────────────────
  /mesas:
    get:
      tags: [Mesas]
      summary: Obtener todas las mesas
      description: Retorna el listado completo de mesas.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mesa'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Mesas]
      summary: Crear una mesa
      description: Crea una nueva mesa.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Mesa'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesa'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mesas/{numero}:
    get:
      tags: [Mesas]
      summary: Obtener una mesa por número
      description: Retorna una mesa según su número identificador.
      parameters:
        - name: numero
          in: path
          required: true
          description: Número identificador de la mesa.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesa'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Mesas]
      summary: Eliminar una mesa
      description: Elimina una mesa según su número identificador.
      parameters:
        - name: numero
          in: path
          required: true
          description: Número identificador de la mesa.
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mesas/estado/{estado}:
    get:
      tags: [Mesas]
      summary: Obtener mesas por estado
      description: Retorna el listado de mesas filtradas por estado.
      parameters:
        - name: estado
          in: path
          required: true
          description: Estado de la mesa.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mesa'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mesas/{numero}/abrir:
    put:
      tags: [Mesas]
      summary: Abrir una mesa
      description: Abre una mesa indicando la cantidad de comensales.
      parameters:
        - name: numero
          in: path
          required: true
          description: Número identificador de la mesa.
          schema:
            type: integer
            format: int32
        - name: numeroComensales
          in: query
          required: true
          description: Cantidad de comensales para abrir la mesa.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesa'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mesas/{numero}/cerrar:
    put:
      tags: [Mesas]
      summary: Cerrar una mesa
      description: Cierra una mesa según su número identificador.
      parameters:
        - name: numero
          in: path
          required: true
          description: Número identificador de la mesa.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesa'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── MÓDULO: COMANDAS ────────────────────────────────────────────────
  /comandas:
    get:
      tags: [Comanda]
      summary: Obtener todas las comandas
      description: Retorna el listado completo de comandas registradas.
      responses:
        '200':
          description: Listado de comandas devuelto con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comanda'
        '401':
          description: No autorizado o token inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Comanda]
      summary: Crear una nueva comanda
      description: Registra una nueva comanda en una mesa asignada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComandaRequest'
      responses:
        '201':
          description: Comanda creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comanda'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comandas/{id}:
    get:
      tags: [Comanda]
      summary: Obtener una comanda por ID
      description: Retorna una comanda según su número identificador.
      parameters:
        - name: id
          in: path
          required: true
          description: Número identificador de la comanda.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Comanda encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comanda'
        '404':
          description: La comanda especificada no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Comanda]
      summary: Eliminar una comanda
      description: Elimina una comanda del sistema según su número identificador.
      parameters:
        - name: id
          in: path
          required: true
          description: Número identificador de la comanda.
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Comanda eliminada con éxito (sin cuerpo)
        '404':
          description: Comanda no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comandas/mesa/{numeroMesa}:
    get:
      tags: [Comanda]
      summary: Obtener comanda activa por mesa
      description: Retorna la comanda asociada a un número de mesa específico.
      parameters:
        - name: numeroMesa
          in: path
          required: true
          description: Número identificador de la mesa.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Comanda de la mesa devuelta con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comanda'
        '404':
          description: No hay comanda activa para la mesa indicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comandas/estado/{estado}:
    get:
      tags: [Comanda]
      summary: Obtener comandas por estado
      description: Retorna el listado de comandas filtradas por su estado actual.
      parameters:
        - name: estado
          in: path
          required: true
          description: Estado de la comanda.
          schema:
            type: string
            enum: [ABIERTA, CERRADA, EN_PROCESO]
      responses:
        '200':
          description: Listado filtrado devuelto con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comanda'

  /comandas/{id}/estado:
    put:
      tags: [Comanda]
      summary: Cambiar estado de una comanda
      description: Actualiza el estado de una comanda existente (ej. pasar a CERRADA).
      parameters:
        - name: id
          in: path
          required: true
          description: Número identificador de la comanda.
          schema:
            type: integer
            format: int32
        - name: nuevoEstado
          in: query
          required: true
          description: Nuevo estado de la comanda.
          schema:
            type: string
            enum: [ABIERTA, CERRADA, EN_PROCESO]
      responses:
        '200':
          description: Estado de comanda actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comanda'
        '404':
          description: Comanda no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comandas/{id}/total:
    get:
      tags: [Comanda]
      summary: Obtener el importe total de una comanda
      description: Retorna la suma total de los precios de los ítems consumidos en la comanda.
      parameters:
        - name: id
          in: path
          required: true
          description: Número identificador de la comanda.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Importe total calculado con éxito
          content:
            application/json:
              schema:
                type: number
                format: double
                example: 11500.50

  # ─── MÓDULO: ÍTEMS DE PEDIDO ─────────────────────────────────────────
  /items-pedido:
    post:
      tags: [Ítems Pedido]
      summary: Agregar un nuevo ítem a una comanda (HU-04)
      description: Asocia un plato y una cantidad a una comanda activa.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemPedidoInput'
      responses:
        '201':
          description: Ítem agregado exitosamente a la comanda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemPedidoResponse'
        '400':
          description: Validación fallida (campos faltantes o cantidad menor a 1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: El número de comanda o el ID del plato no existen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Ítems Pedido]
      summary: Eliminar un ítem específico de una comanda
      description: Remueve la relación entre un plato y una comanda por ID compuestos recibidos como query parameters.
      parameters:
        - in: query
          name: numeroComanda
          required: true
          schema:
            type: integer
          example: 101
        - in: query
          name: idPlato
          required: true
          schema:
            type: integer
          example: 45
      responses:
        '204':
          description: Ítem eliminado correctamente de la comanda (sin cuerpo de respuesta)
        '404':
          description: No se encontró la combinación de comanda y plato solicitada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /items-pedido/comanda/{numeroComanda}:
    get:
      tags: [Ítems Pedido]
      summary: Listar todos los ítems cargados en una comanda
      description: Devuelve el listado completo de platos asociados a una comanda dada.
      parameters:
        - in: path
          name: numeroComanda
          required: true
          schema:
            type: integer
          example: 101
      responses:
        '200':
          description: Lista de ítems pertenecientes a la comanda devuelta con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemPedidoResponse'
        '404':
          description: La comanda especificada no existe en el sistema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /items-pedido/estado/{estado}:
    get:
      tags: [Ítems Pedido]
      summary: Filtrar ítems por estado para vista de Cocina (HU-06)
      description: Retorna la lista de renglones de pedidos según el estado enviado (ej. PENDIENTE para los cocineros).
      parameters:
        - in: path
          name: estado
          required: true
          schema:
            type: string
            enum: [PENDIENTE, EN_PREPARACION, LISTO, ENTREGADO]
          example: PENDIENTE
      responses:
        '200':
          description: Lista de ítems en el estado solicitado devuelta con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemPedidoResponse'

  /items-pedido/estado:
    put:
      tags: [Ítems Pedido]
      summary: Actualizar el estado de un ítem (Cocina / Mozo) (HU-07)
      description: Permite cambiar el flujo del ítem (ej. Cocina pasa un plato de EN_PREPARACION a LISTO).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstadoUpdateInput'
      responses:
        '200':
          description: Estado modificado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemPedidoResponse'
        '404':
          description: Ítem no encontrado para actualizar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Regla de negocio fallida (ej. transición de estado no válida)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── MÓDULO: PLATOS ──────────────────────────────────────────────────
  /platos:
    get:
      tags: [Platos]
      summary: Obtener todos los platos
      description: Retorna el listado completo de platos, incluyendo activos e inactivos.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plato'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Platos]
      summary: Crear un plato
      description: Crea un nuevo plato.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plato'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plato'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /platos/activos:
    get:
      tags: [Platos]
      summary: Obtener platos activos
      description: Retorna el listado de platos activos.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plato'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /platos/categoria/{idCategoria}:
    get:
      tags: [Platos]
      summary: Obtener platos por categoría
      description: Retorna el listado de platos asociados a una categoría.
      parameters:
        - name: idCategoria
          in: path
          required: true
          description: Identificador de la categoría.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plato'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /platos/{id}:
    get:
      tags: [Platos]
      summary: Obtener un plato por ID
      description: Retorna un plato según su identificador.
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador del plato.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plato'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Platos]
      summary: Actualizar un plato
      description: Actualiza los datos de un plato existente.
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador del plato.
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plato'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plato'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Platos]
      summary: Eliminar un plato
      description: Elimina lógicamente un plato del menú.
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador del plato.
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /platos/{id}/toggle-activo:
    put:
      tags: [Platos]
      summary: Alternar estado activo de un plato
