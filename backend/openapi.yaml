# ─── COMPONENTES REUTILIZABLES ────────────────────────────────────────────────
components:


  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Token JWT obtenido en el login. Pendiente de implementar con Spring Security.
        Incluir en el header: Authorization: Bearer <token>


  schemas:


    Mesa:
      type: object
      properties:
        numeroMesa:
          type: integer
          format: int32
          example: 3
        capacidad:
          type: integer
          format: int32
          example: 4
        sector:
          type: string
          example: Patio
        estadoMesa:
          type: string
          enum: [Libre, Ocupada, Reservada]
          example: Libre
        horaDeApertura:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-03T19:30:00Z"


    MesaInput:
      type: object
      required: [capacidad, sector, estadoMesa]
      properties:
        capacidad:
          type: integer
          format: int32
          minimum: 1
          example: 4
        sector:
          type: string
          example: Patio
        estadoMesa:
          type: string
          enum: [Libre, Ocupada, Reservada]
          example: Libre


    Comanda:
      type: object
      properties:
        numeroComanda:
          type: integer
          format: int32
          example: 101
        fecha:
          type: string
          format: date-time
          example: "2026-06-03T15:30:00Z"
        estadoComanda:
          type: string
          enum: [Abierta, Cancelada, "En preparacion", Lista, Entregada, Cerrada]
          example: Abierta
        mesa:
          $ref: '#/components/schemas/Mesa'
        mozos:
          type: array
          items:
            $ref: '#/components/schemas/Usuario'


    ComandaInput:
      type: object
      required: [estadoComanda, mesa]
      properties:
        estadoComanda:
          type: string
          enum: [Abierta, Cancelada, "En preparacion", Lista, Entregada, Cerrada]
          example: Abierta
        mesa:
          $ref: '#/components/schemas/Mesa'


    ItemPedidoInput:
      type: object
      required: [numeroComanda, idPlato, cantidad]
      properties:
        numeroComanda:
          type: integer
          description: ID de la comanda a la que pertenece el ítem
          example: 101
        idPlato:
          type: integer
          description: ID del plato solicitado
          example: 45
        cantidad:
          type: integer
          minimum: 1
          example: 2
        notas:
          type: string
          nullable: true
          description: Observaciones opcionales para la cocina
          example: Sin cebolla


    ItemPedidoResponse:
      type: object
      properties:
        numeroComanda:
          type: integer
          example: 101
        idPlato:
          type: integer
          example: 45
        cantidad:
          type: integer
          example: 2
        notas:
          type: string
          nullable: true
          example: Sin cebolla
        estadoItem:
          type: string
          enum: [Pendiente, "En preparacion", Listo, Entregado, Cancelado]
          example: Pendiente


    EstadoItemInput:
      type: object
      required: [numeroComanda, idPlato, nuevoEstado]
      properties:
        numeroComanda:
          type: integer
          example: 101
        idPlato:
          type: integer
          example: 45
        nuevoEstado:
          type: string
          enum: [Pendiente, "En preparacion", Listo, Entregado, Cancelado]
          example: "En preparacion"


    Categoria:
      type: object
      required: [nombre]
      properties:
        idCategoria:
          type: integer
          format: int32
          example: 1
        nombre:
          type: string
          example: Principales


    Plato:
      type: object
      required: [nombre, precio, descripcion, categoria]
      properties:
        idPlato:
          type: integer
          format: int32
          example: 45
        nombre:
          type: string
          example: Milanesa a la Napolitana con fritas
        precio:
          type: number
          format: double
          example: 8500.50
        descripcion:
          type: string
          example: Milanesa de ternera con salsa fileto, jamón y muzzarella
        activo:
          type: boolean
          example: true
        categoria:
          $ref: '#/components/schemas/Categoria'


    Ingrediente:
      type: object
      required: [nombre, stock, stockMinimo, unidad]
      properties:
        idIngrediente:
          type: integer
          format: int32
          example: 10
        nombre:
          type: string
          example: Tomate Perita
        stock:
          type: integer
          format: int32
          example: 50
        stockMinimo:
          type: integer
          format: int32
          example: 15
        unidad:
          type: string
          example: kg


    Receta:
      type: object
      required: [plato, ingrediente, cantidad]
      properties:
        id:
          type: object
          properties:
            idPlato:
              type: integer
              format: int32
              example: 45
            idIngrediente:
              type: integer
              format: int32
              example: 10
        plato:
          $ref: '#/components/schemas/Plato'
        ingrediente:
          $ref: '#/components/schemas/Ingrediente'
        cantidad:
          type: integer
          format: int32
          description: Cantidad del ingrediente necesaria para preparar una unidad del plato
          example: 200


    MovStock:
      type: object
      properties:
        idMov:
          type: integer
          format: int32
          example: 1
        fecha:
          type: string
          format: date-time
          example: "2026-06-03T10:00:00Z"
        cantidad:
          type: integer
          format: int32
          description: Positivo = ingreso, Negativo = consumo o descuento
          example: -5
        ingrediente:
          $ref: '#/components/schemas/Ingrediente'
        usuario:
          $ref: '#/components/schemas/Usuario'


    Usuario:
      type: object
      required: [nombre, email, password, rol]
      properties:
        idUsuario:
          type: integer
          format: int32
          example: 4
        nombre:
          type: string
          example: Juan Pérez
        email:
          type: string
          format: email
          example: juan.perez@restaurante.com
        password:
          type: string
          format: password
          description: Se almacena hasheada — no se devuelve en GET
          example: "12345678"
        rol:
          type: string
          enum: [administrador, mozo, cocinero]
          example: mozo


    PaginaPlatos:
      type: object
      description: Respuesta paginada del endpoint GET /api/menu
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Plato'
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 0
            limit:
              type: integer
              example: 8
            total:
              type: integer
              example: 24
            totalPages:
              type: integer
              example: 3


    Error:
      type: object
      description: Formato unificado de error devuelto por GlobalExceptionHandler
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Identificador del error en SNAKE_UPPER_CASE
              example: RECURSO_NO_ENCONTRADO
            message:
              type: string
              description: Descripción legible del error
              example: La mesa número 5 no existe
            details:
              type: string
              nullable: true
              description: Información adicional opcional
              example: null
