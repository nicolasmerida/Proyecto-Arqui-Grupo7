# ─── COMPONENTES REUTILIZABLES (MOLDES / ENTIDADES) ───────────────────
components:
  schemas:
    Mesa:
      type: object
      required:
        - capacidad
        - sector
        - estadoMesa
      properties:
        numeroMesa:
          type: integer
          format: int32
          example: 5
        capacidad:
          type: integer
          format: int32
          example: 4
        sector:
          type: string
          example: "Patio"
        estadoMesa:
          type: string
          example: "LIBRE"
        horaDeApertura:
          type: string
          format: date-time
          example: "2026-05-29T19:30:00Z"

    Comanda:
      type: object
      properties:
        numeroComanda:
          type: integer
          format: int32
          example: 101
        fecha:
          type: string
          format: date-time
